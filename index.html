<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noema</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Splash: fades out once the graph loads -->
      <div id="splash" class="splash">
        <div class="splash-content">
          <h1>Noema</h1>
          <p>your personal space</p>
        </div>
      </div>

      <!-- Full-viewport 3D graph -->
      <div id="graph-container"></div>

      <!-- Subtle stats in top-left corner -->
      <div id="graph-stats" class="graph-stats">
        <span id="stat-notes">0 notes</span>
        <span class="stats-dot">&middot;</span>
        <span id="stat-topics">0 topics</span>
      </div>

      <!-- Editor panel (slides in from the right) -->
      <aside id="editor-panel" class="editor-panel">
        <div class="editor-header">
          <button id="editor-close" class="panel-close-btn" aria-label="Close">&times;</button>
          <span id="save-status" class="save-status"></span>
        </div>
        <label for="note-title" class="sr-only">Note title</label>
        <input id="note-title" class="note-title" placeholder="Title" autocomplete="off" />
        <label for="note-body" class="sr-only">Note body</label>
        <textarea id="note-body" class="note-body" placeholder="Write your thoughts..." spellcheck="false"></textarea>
        <div class="editor-footer">
          <button id="delete-note-btn" class="delete-btn">Delete note</button>
        </div>
      </aside>

      <!-- Floating panels (appear above the bar) -->
      <div id="search-panel" class="floating-panel hidden">
        <label for="search-input" class="sr-only">Search notes</label>
        <input id="search-input" class="panel-input" type="search" placeholder="Search your notes..." autocomplete="off" />
        <div id="search-results" class="panel-results"></div>
      </div>

      <div id="filter-panel" class="floating-panel hidden">
        <div id="filter-list" class="filter-list"></div>
      </div>

      <div id="chat-panel" class="floating-panel hidden">
        <div id="chat-thread" class="chat-thread"></div>
        <div class="chat-input-row">
          <label for="chat-input" class="sr-only">Ask about your notes</label>
          <input id="chat-input" class="panel-input" type="text" placeholder="Ask about your notes..." autocomplete="off" />
          <label for="chat-model-select" class="sr-only">Model</label>
          <select id="chat-model-select" class="chat-model-select">
            <option value="">default</option>
          </select>
        </div>
      </div>

      <!-- Floating bar (minimal, centered bottom) -->
      <nav class="floating-bar">
        <button id="search-btn" class="bar-btn" title="Search (⌘K)">Search</button>
        <div class="bar-divider"></div>
        <button id="new-btn" class="bar-btn" title="New note (⌘N)">+ New</button>
        <div class="bar-divider"></div>
        <button id="filter-btn" class="bar-btn" title="Toggle filters">Filter</button>
        <div class="bar-divider"></div>
        <button id="chat-btn" class="bar-btn" title="Chat (⌘J)">Chat</button>
        <div class="bar-divider"></div>
        <button id="rebuild-btn" class="bar-btn bar-btn-muted" title="Rebuild search index">Index</button>
      </nav>

      <!-- Setup dialog (first launch) -->
      <dialog id="setup-dialog" class="setup-dialog">
        <form method="dialog" class="setup-content">
          <h2>Welcome to Noema</h2>
          <p>Point Noema at the folder where your notes live. Everything stays on your device.</p>
          <input id="setup-path" type="text" placeholder="/Users/you/notes" autocomplete="off" />
          <button type="submit">Get Started</button>
        </form>
      </dialog>

      <!-- Delete confirmation -->
      <dialog id="delete-dialog" class="delete-dialog">
        <form method="dialog" class="delete-dialog-content">
          <h2>Delete this note?</h2>
          <p class="delete-dialog-copy">
            This can't be undone.
            <span id="delete-note-name" class="delete-note-name"></span>
          </p>
          <div class="dialog-actions">
            <button type="submit" value="cancel">Cancel</button>
            <button id="delete-confirm-btn" type="button" class="danger-btn">Delete</button>
          </div>
        </form>
      </dialog>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
