<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noema</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="header-left">
          <input
            id="search"
            type="search"
            placeholder="search..."
            autocomplete="off"
          />
        </div>
        <div class="header-right">
          <button id="new-note-btn">+ new note</button>
        </div>
      </header>

      <div class="status-bar">
        <span id="status" class="muted">checking…</span>
        <span id="save-status" class="muted"></span>
      </div>

      <main class="app-main">
        <aside class="sidebar">
          <div class="sidebar-header">notes</div>
          <div id="note-tree" class="note-tree"></div>
        </aside>

        <section class="editor">
          <input
            id="note-title"
            class="note-title"
            placeholder="untitled"
            autocomplete="off"
          />
          <textarea
            id="note-body"
            class="note-body"
            spellcheck="false"
          ></textarea>

          <div id="search-results" class="search-results hidden"></div>
        </section>
      </main>

      <footer class="chat-bar">
        <div id="chat-thread" class="chat-thread"></div>
        <input
          id="chat-input"
          type="text"
          placeholder="ask anything about your notes..."
          autocomplete="off"
        />
      </footer>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
