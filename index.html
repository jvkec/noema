<!DOCTYPE html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noema</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Noema</h1>

        </div>
        <div id="results"></div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
